name: CI - Project 1 Vendor Payments ETL

on:
  push:
    branches:
      - main
      - refactor/production-readiness
  pull_request:
    branches:
      - main

jobs:
  validate-etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff lint
        run: |
          python -m ruff check .

      - name: Run sample ETL pipeline
        run: |
          python scripts/pipeline/run_pipeline.py --sample

      - name: Run tests
        run: |
          python -m pytest -v